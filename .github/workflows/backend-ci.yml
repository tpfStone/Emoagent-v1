name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'alembic/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'alembic/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: emoagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run code formatting check (black)
        run: |
          black --check app/ tests/
      
      - name: Run import sorting check (isort)
        run: |
          isort --check-only app/ tests/
      
      - name: Run type checking (mypy)
        run: |
          mypy app/ --ignore-missing-imports
      
      - name: Wait for services to be ready
        run: |
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432 -U test_user; do sleep 1; done'
          timeout 30 bash -c 'until redis-cli -h localhost ping; do sleep 1; done'
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/emoagent_test
          REDIS_URL: redis://localhost:6379/0
          LLM_PROVIDER: mock
          ENABLE_EMOTION_DETECTION: "false"
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term -v
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true
